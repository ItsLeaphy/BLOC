<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

</head>
<body>
<style>
/* ============================================================
   BLOC — DESIGN SYSTEM v2.1
   Status: ESTABILIZADO
   ────────────────────────────────────────────────────────────
   Fase 1: Tokens + Tipografia          ✓ completo
   Fase 2: Componentes + Navegação      ✓ completo
   Fase 3: Estados + Microinterações    ✓ aplicado
   Fase 4: Refinamento de identidade    ✓ parcial
   ────────────────────────────────────────────────────────────
   Migration layer: tokens antigos mapeados em :root
   Compatibilidade: --br, --br2, --ac2, --accent-color, --anim
   ============================================================ */

/* --- RESET --- */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ============================================================
   § TOKENS — Sistema de design unificado
   ────────────────────────────────────────────────────────────
   HIERARQUIA DE TOKENS:
   
   1. SURFACES     --bg → --s1 → --s2 → --s3 → --s4
      Cada camada é +7-10% de claridade. Nunca pule camadas.
   
   2. BORDAS       --b1 (padrão) / --b2 (hover/ativo)
      Sempre 0.5px solid. Reserve 1px para foco/erro.
   
   3. TEXTO        --tc (primário) → --t2 → --t3 → --t4 (ghost)
      Nunca use cor fora desta escala para texto.
   
   4. ESPACAMENTO  --sp-{2|4|8|12|16|24|32|48}
      Grid de 8pt. Nunca use valores fora desta escala.
   
   5. RADIUS       --r-sm(6) / --r-md(10) / --r-lg(14) / --r-xl(20)
      Cards = --r-lg. Elementos internos = --r-md ou --r-sm.
   
   6. TIPOGRAFIA   --fs-display(22) / title(17) / body(14) / sub(12) / micro(10)
      Peso: --fw-normal(400) / --fw-medium(500). Nada mais.
   
   7. MOTION       --dur-fast(0.12s) / base(0.22s) / slow(0.38s)
      + --ease-out / --ease-spring / --ease-sharp
   ============================================================ */
:root{
  /* Surface layers — 3 camadas, diferença perceptível */
  --bg:   #060606; /* Layer 0: fundação */
  --s1:   #0d0d0d; /* Layer 1: cards, header, nav */
  --s2:   #141414; /* Layer 2: interior de cards abertos */
  --s3:   #1c1c1c; /* Layer 3: inputs, botões secundários */
  --s4:   #242424; /* Layer 4: hover states, foco */

  /* Bordas — apenas 2 valores */
  --b1: rgba(255,255,255,0.06);  /* borda padrão */
  --b2: rgba(255,255,255,0.10);  /* borda hover / ativo */

  /* Texto — escala de 4 níveis */
  --tc: #f0f0f0;  /* primário */
  --t2: #707070;  /* secundário */
  --t3: #303030;  /* terciário / decorativo */
  --t4: #1e1e1e;  /* ghost — linhas divisórias */

  /* Acento — branco por padrão, sobreponível */
  --ac: #ffffff;

  /* Cores semânticas */
  --green: #22c55e;
  --red:   #ef4444;
  --yellow:#f59e0b;
  --blue:  #60a5fa;

  /* Tipografia */
  --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;

  /* Escala tipográfica — 5 stops */
  --fs-display: 22px; /* valores grandes, percentuais */
  --fs-title:   17px; /* títulos de seção, nome de bloco aberto */
  --fs-body:    14px; /* nome de exercício, label de card */
  --fs-sub:     12px; /* metadados, subtítulos */
  --fs-micro:   10px; /* labels de input, badges de seção */

  /* Peso — apenas 2 */
  --fw-normal: 400;
  --fw-medium: 500;

  /* Espaçamento — grid de 8pt */
  --sp-2: 2px;
  --sp-4: 4px;
  --sp-8: 8px;
  --sp-12: 12px;
  --sp-16: 16px;
  --sp-24: 24px;
  --sp-32: 32px;
  --sp-48: 48px;

  /* Border radius */
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 20px;
  --r-pill: 100px;

  /* Animação — motion preciso */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-sharp: cubic-bezier(0.4, 0, 0.2, 1);
  --dur-fast: 0.12s;
  --dur-base: 0.22s;
  --dur-slow: 0.38s;

  /* Overrides via JS */
  --radius-global: 14px;
  --anim-speed: 0.22s;
  --font-family: var(--font);

  /* ─── MIGRATION LAYER — aliases de compatibilidade ───────────
     Tokens do sistema anterior mapeados para os novos.
     Mantidos para garantir que CSS externo ou snippets antigos
     ainda funcionem durante a transição.
     TODO: remover após migração completa (v3).
  ─────────────────────────────────────────────────────────── */
  --br:   var(--b1);   /* old: --br  → --b1 */
  --br2:  var(--b2);   /* old: --br2 → --b2 */
  --ac2:  var(--t2);   /* old: --ac2 → --t2 (secondary text) */
  --accent-color: var(--ac); /* old: --accent-color → --ac */
  --anim: var(--dur-base);   /* old: --anim → --dur-base */
}

/* ============================================================
   § STRUCTURE
   ============================================================ */
html,body{
  height:100%; /* necessário para que #app tenha altura definida e #content possa scrollar */
}

body{
  margin:0;
  background:var(--bg);
  font-family:var(--font-family);
  color:var(--tc);
  -webkit-font-smoothing:antialiased;
}

#app{
  font-family:var(--font-family);
  background:var(--bg);
  color:var(--tc);
  height:100dvh; /* min-height → height: container precisa de altura fixa para scroll funcionar */
  max-width:430px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow:hidden;
}

/* ============================================================
   § HEADER
   ============================================================ */
#hdr{
  padding:16px var(--sp-16) 12px;
  background:var(--s1);
  border-bottom:0.5px solid var(--b1);
  border-top:1px solid rgba(255,255,255,0.04); /* detalhe premium: linha de acento no topo */
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:var(--sp-8);
  position:sticky;
  top:0;
  z-index:50;
}

.logo{
  font-size:12px;
  font-weight:var(--fw-medium);
  letter-spacing:5px;
  color:var(--ac);
  text-transform:uppercase;
  flex-shrink:0;
  line-height:1;
}

.hdr-center{
  display:flex;
  align-items:center;
  gap:var(--sp-8);
  flex:1;
  justify-content:center;
}

.date-pill{
  font-size:var(--fs-micro);
  color:var(--t2);
  letter-spacing:0.5px;
  font-weight:var(--fw-normal);
}

.cfg-gear-btn{
  width:32px;
  height:32px;
  border-radius:var(--r-sm);
  background:transparent;
  border:0.5px solid var(--b1);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
  transition:background var(--dur-fast) var(--ease-sharp),
             border-color var(--dur-fast) var(--ease-sharp),
             transform var(--dur-base) var(--ease-spring);
  color:var(--t2);
}
.cfg-gear-btn:hover{border-color:var(--b2);color:var(--tc);background:var(--s3)}
.cfg-gear-btn:active{transform:scale(0.93)}
.cfg-gear-btn.active{border-color:var(--b2);color:var(--ac);background:var(--s3);transform:rotate(45deg)}
.cfg-gear-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* ============================================================
   § NAVIGATION — Bottom bar
   ============================================================ */
#nav{
  position:sticky;
  bottom:0;
  left:0;
  right:0;
  background:var(--s1);
  border-top:0.5px solid var(--b1);
  display:flex;
  padding:10px 0 max(14px, env(safe-area-inset-bottom));
  z-index:50;
}

.nb{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
  cursor:pointer;
  padding:6px 4px;
  border:none;
  background:transparent;
  color:var(--t2); /* t3 → t2: t3 é quase invisível em temas claros */
  font-family:var(--font-family);
  font-size:9px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  font-weight:var(--fw-medium);
  transition:color var(--dur-fast) var(--ease-sharp);
  position:relative;
}
.nb svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;transition:transform var(--dur-base) var(--ease-spring)}
.nb.active{color:var(--ac)}
.nb.active svg{transform:scale(1.1)}
.nb:active svg{transform:scale(0.9)}

/* Active indicator — dot acima do ícone */
.nb-dot{
  position:absolute;
  top:2px;
  left:50%;
  transform:translateX(-50%);
  width:3px;
  height:3px;
  border-radius:50%;
  background:var(--ac);
  opacity:0;
  transition:opacity var(--dur-base) var(--ease-sharp);
}
.nb.active .nb-dot{opacity:1}

/* ============================================================
   § CONTENT AREA
   ============================================================ */
#content{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch; /* scroll inercial em iOS */
  padding:var(--sp-16);
  padding-bottom:var(--sp-48);
  scroll-behavior:smooth;
  overscroll-behavior:contain;
  min-height:0; /* garante que flex:1 não expande além do container pai */
}
#content::-webkit-scrollbar{width:2px}
#content::-webkit-scrollbar-thumb{background:var(--s3);border-radius:1px}

/* ============================================================
   § SECTION LABELS
   ============================================================ */
.sec{
  font-size:var(--fs-micro);
  font-weight:var(--fw-medium);
  color:var(--t3);
  letter-spacing:1.5px; /* Reduzido de 2.5px: audit rule — tracking máximo de 1.5px em 10px */
  text-transform:uppercase;
  margin:var(--sp-24) 0 var(--sp-12);
  display:flex;
  align-items:center;
  gap:var(--sp-8);
}
.sec:first-child{margin-top:0}
.sec::after{
  content:'';
  flex:1;
  height:0.5px;
  background:var(--t4);
}

/* ============================================================
   § BLOCK CARDS (.bc)
   ============================================================ */
.bc{
  background:var(--s1);
  border:0.5px solid var(--b1);
  border-radius:var(--r-lg);
  margin-bottom:var(--sp-8);
  overflow:hidden;
  transition:border-color var(--dur-base) var(--ease-sharp);
}
.bc.open{border-color:var(--b2);background:var(--s2)} /* bloco aberto sobe para s2: profundidade percetível */

/* Accent left-border colors */
.bc[data-color="pink"]  {border-left:2px solid rgba(244,114,182,0.6)}
.bc[data-color="blue"]  {border-left:2px solid rgba(96,165,250,0.6)}
.bc[data-color="green"] {border-left:2px solid rgba(74,222,128,0.6)}
.bc[data-color="orange"]{border-left:2px solid rgba(251,146,60,0.6)}
.bc[data-color="purple"]{border-left:2px solid rgba(167,139,250,0.6)}
.bc[data-color="yellow"]{border-left:2px solid rgba(251,191,36,0.6)}
.bc[data-color="red"]   {border-left:2px solid rgba(248,113,113,0.6)}
.bc[data-color="teal"]  {border-left:2px solid rgba(45,212,191,0.6)}

/* Block header */
.bh{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px var(--sp-16);
  cursor:pointer;
  user-select:none;
  transition:background var(--dur-fast) var(--ease-sharp);
  gap:var(--sp-12);
}
.bh:active{background:rgba(255,255,255,0.04)}

.bl-icon{
  width:32px;
  height:32px;
  border-radius:var(--r-sm);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  background:var(--s3);
  border:0.5px solid var(--b1);
  transition:transform var(--dur-base) var(--ease-spring);
  color:var(--t2);
}
.bl-icon svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.bc.open .bl-icon{transform:scale(1.05);border-color:var(--b2);color:var(--tc)}
.bc.open .bn{font-size:15px} /* Título do bloco aberto — escala para 15px conforme design system */

.bh-info{flex:1;min-width:0}
.bn{
  font-size:var(--fs-body);
  font-weight:var(--fw-medium);
  color:var(--tc);
  letter-spacing:-0.1px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.bs{
  font-size:var(--fs-sub);
  color:var(--t2);
  margin-top:2px;
  font-weight:var(--fw-normal);
}

.bh-right{display:flex;align-items:center;gap:var(--sp-8);flex-shrink:0}

/* Done indicator */
.done-dot{
  width:5px;
  height:5px;
  border-radius:50%;
  background:var(--green);
  opacity:0.8;
}

/* Chevron */
.bchev{
  color:var(--t3);
  display:flex;
  align-items:center;
  transition:transform var(--dur-base) var(--ease-spring);
}
.bchev svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.bchev.o{transform:rotate(180deg)}

/* Block body */
.bbody{
  border-top:0.5px solid var(--t4);
  padding:0 var(--sp-16) var(--sp-16);
  animation:slideDown var(--dur-base) var(--ease-out);
}

/* ============================================================
   § EXERCISE ROWS
   ============================================================ */
.ex-row{
  padding:var(--sp-12) 0;
  border-bottom:0.5px solid var(--t4);
}
.ex-row:last-of-type{border-bottom:none}

.ex-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:var(--sp-8);
  cursor:pointer;
  transition:opacity var(--dur-fast) var(--ease-sharp);
}
.ex-top:active{opacity:0.7}

.ex-name{
  font-size:var(--fs-body);
  color:var(--tc);
  flex:1;
  font-weight:var(--fw-normal);
}

.ex-meta{display:flex;gap:var(--sp-8);align-items:center}

.ex-tag{
  font-size:11px;
  color:var(--t2);
  background:var(--s3);
  padding:2px var(--sp-8);
  border-radius:var(--r-sm);
  border:0.5px solid var(--b1);
  white-space:nowrap;
  font-weight:var(--fw-normal);
}

.ex-expand-btn{
  width:20px;
  height:20px;
  border-radius:var(--r-sm);
  background:transparent;
  border:0.5px solid var(--b1);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
  transition:background var(--dur-fast) var(--ease-sharp),
             transform var(--dur-base) var(--ease-spring);
  color:var(--t3);
}
.ex-expand-btn svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ex-expand-btn:hover{background:var(--s3);color:var(--tc);border-color:var(--b2)}
.ex-expand-btn.open-btn{transform:rotate(180deg);border-color:var(--b2);background:var(--s3);color:var(--tc)}

/* Exercise detail section */
.ex-detail{
  margin-top:var(--sp-12);
  background:var(--s2);
  border-radius:var(--r-md);
  border:0.5px solid var(--b1);
  overflow:hidden;
  animation:slideDown var(--dur-fast) var(--ease-out);
}

.ex-inputs-row{
  display:flex;
  gap:var(--sp-8);
  padding:var(--sp-12) var(--sp-16);
  border-bottom:0.5px solid var(--t4);
}

.inp-g{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:var(--sp-4);
}

.inp-g input{
  width:56px;
  background:var(--s3);
  border:0.5px solid var(--b1);
  border-radius:var(--r-sm);
  padding:7px var(--sp-4);
  font-size:var(--fs-body);
  color:var(--tc);
  text-align:center;
  outline:none;
  font-family:inherit;
  font-weight:var(--fw-medium);
  transition:border-color var(--dur-fast) var(--ease-sharp);
  -moz-appearance:textfield;
}
.inp-g input::-webkit-inner-spin-button,
.inp-g input::-webkit-outer-spin-button{-webkit-appearance:none}
.inp-g input:focus{border-color:var(--b2);background:var(--s4)}

.inp-lbl{
  font-size:9px;
  color:var(--t3);
  letter-spacing:1px;
  text-transform:uppercase;
  font-weight:var(--fw-medium);
}

/* ============================================================
   § TREND BADGES
   ============================================================ */
.trnd{
  display:inline-flex;
  align-items:center;
  gap:2px;
  font-size:10px;
  padding:2px var(--sp-8);
  border-radius:var(--r-pill);
  font-weight:var(--fw-medium);
  letter-spacing:0.2px;
}
.trnd.up{color:var(--green);background:rgba(34,197,94,.08);border:0.5px solid rgba(34,197,94,.18)}
.trnd.dn{color:var(--red);background:rgba(239,68,68,.08);border:0.5px solid rgba(239,68,68,.18)}
.trnd.eq{color:var(--t2);background:var(--s3);border:0.5px solid var(--b1)}

/* ============================================================
   § REGISTER BUTTON
   ============================================================ */
.sreg{
  width:100%;
  margin-top:var(--sp-16);
  padding:var(--sp-12);
  background:transparent;
  border:0.5px solid var(--b2);
  border-radius:var(--r-md);
  color:var(--t2);
  font-size:var(--fs-sub);
  cursor:pointer;
  font-family:inherit;
  font-weight:var(--fw-medium);
  letter-spacing:1px;
  text-transform:uppercase;
  transition:all var(--dur-base) var(--ease-sharp),
             transform var(--dur-fast) var(--ease-spring);
}
.sreg:hover{background:var(--s3);color:var(--tc);border-color:var(--b2)}
.sreg:active{transform:scale(0.96)} /* slight haptic */
.sreg.done{
  border-color:rgba(34,197,94,0.25);
  color:var(--green);
  background:rgba(34,197,94,0.04);
}

/* ============================================================
   § ADD BUTTONS
   ============================================================ */
.add-b{
  display:flex;
  align-items:center;
  gap:var(--sp-8);
  background:transparent;
  border:0.5px dashed var(--t4);
  border-radius:var(--r-md);
  padding:10px var(--sp-16);
  cursor:pointer;
  color:var(--t3);
  font-size:var(--fs-sub);
  font-family:inherit;
  width:100%;
  margin-top:var(--sp-8);
  transition:border-color var(--dur-fast) var(--ease-sharp),
             color var(--dur-fast) var(--ease-sharp),
             transform var(--dur-fast) var(--ease-spring);
  font-weight:var(--fw-medium);
  letter-spacing:0.5px;
}
.add-b:hover{border-color:var(--t2);color:var(--t2)}
.add-b:active{transform:scale(0.98)}
.add-b svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* ============================================================
   § WEEK GRID
   ============================================================ */
.wk-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:var(--sp-8);
}

.dc{
  background:var(--s1);
  border:0.5px solid var(--b1);
  border-radius:var(--r-lg);
  padding:var(--sp-12);
  cursor:pointer;
  transition:border-color var(--dur-fast) var(--ease-sharp),
             transform var(--dur-base) var(--ease-spring);
}
.dc:hover{border-color:var(--b2)}
.dc:active{transform:scale(0.97)}
.dc.today{border-color:var(--b2)}

.dc-day{
  font-size:var(--fs-micro);
  font-weight:var(--fw-medium);
  color:var(--t2);
  letter-spacing:2px;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:var(--sp-8);
  margin-bottom:var(--sp-8);
}
.dc.today .dc-day{color:var(--tc)}

.dc-dot{
  display:inline-block;
  width:3px;
  height:3px;
  border-radius:50%;
  background:var(--t3);
  margin-right:var(--sp-4);
  vertical-align:middle;
}
.dc.today .dc-dot{background:var(--t2)}

.dc-blocks{
  font-size:var(--fs-sub);
  color:var(--t2); /* t3 (#303030) era imperceptível; t2 (#707070) é legível */
  line-height:1.9;
}

/* ============================================================
   § HISTORY CARDS
   ============================================================ */
.hist-c{
  background:var(--s1);
  border:0.5px solid var(--b1);
  border-radius:var(--r-lg);
  margin-bottom:var(--sp-8);
  overflow:hidden;
}

.hist-h{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:var(--sp-12) var(--sp-16);
  cursor:pointer;
  transition:background var(--dur-fast) var(--ease-sharp);
}
.hist-h:active{background:rgba(255,255,255,0.04)}

.hist-date{font-size:11px;color:var(--t2);letter-spacing:0.3px;margin-top:2px}
.hist-day{font-size:var(--fs-body);font-weight:var(--fw-medium);color:var(--tc)}

.hist-body{
  padding:0 var(--sp-16) var(--sp-16);
  border-top:0.5px solid var(--t4);
  animation:slideDown var(--dur-base) var(--ease-out);
}

.h-ex-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:var(--sp-8) 0;
  border-bottom:0.5px solid var(--t4);
  font-size:var(--fs-sub);
}
.h-ex-row:last-child{border-bottom:none}
.h-ex-name{color:var(--t2);flex:1}
.h-ex-val{color:var(--tc);font-weight:var(--fw-medium)}

/* ============================================================
   § PROGRESS / INDICATOR CARDS
   ============================================================ */
.ind-card{
  background:var(--s1);
  border:0.5px solid var(--b1);
  border-radius:var(--r-lg);
  padding:var(--sp-16);
  margin-bottom:var(--sp-8);
}
.ind-ex{
  font-size:10px; /* Sobrescreve --fs-sub intencionalmente: labels de indicador são sempre 10px */
  font-weight:var(--fw-medium);
  color:var(--t2);
  margin-bottom:var(--sp-12);
  letter-spacing:1.5px;
  text-transform:uppercase;
}
.ind-cmp{display:flex;align-items:center;gap:var(--sp-16)}
.ind-val{text-align:center}
.ind-num{
  font-size:var(--fs-display);
  font-weight:var(--fw-medium);
  color:var(--tc);
  letter-spacing:-0.5px;
  line-height:1;
}
.ind-lbl{
  font-size:9px;
  color:var(--t3);
  letter-spacing:1px;
  text-transform:uppercase;
  margin-top:var(--sp-4);
}
.ind-arr{font-size:18px;color:var(--t3)}
.ind-arr.up{color:var(--green)}
.ind-arr.dn{color:var(--red)}

/* ============================================================
   § GOALS CARDS
   ============================================================ */
.goal-c{
  background:var(--s1);
  border:0.5px solid var(--b1);
  border-radius:var(--r-lg);
  padding:var(--sp-16);
  margin-bottom:var(--sp-8);
}
.goal-h{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  margin-bottom:var(--sp-12);
  gap:var(--sp-8);
}
.goal-n{
  font-size:var(--fs-body);
  font-weight:var(--fw-medium);
  color:var(--tc);
}
.goal-pct{
  font-size:var(--fs-display);
  font-weight:var(--fw-medium);
  color:var(--ac);
  letter-spacing:-1px; /* números grandes ficam mais densos com tracking negativo */
  line-height:1;
  flex-shrink:0;
}

.goal-bar-bg{
  background:var(--s3);
  border-radius:var(--r-pill);
  height:5px; /* 3px → 5px: perceptível em mobile sem exagero */
  overflow:hidden;
  margin-bottom:var(--sp-12);
}
.goal-bar-f{
  height:100%;
  background:var(--ac);
  border-radius:var(--r-pill);
  transition:width 0.6s var(--ease-out);
  opacity:0.9;
}

.prog-bar-bg{
  background:var(--s3);
  border-radius:var(--r-pill);
  height:5px;
  overflow:hidden;
  margin-bottom:var(--sp-8);
}
.prog-bar-f{
  height:100%;
  background:var(--ac);
  border-radius:var(--r-pill);
  transition:width 0.6s var(--ease-out);
  opacity:0.9;
}
.prog-vals{
  display:flex;
  justify-content:space-between;
  font-size:10px;
  color:var(--t3);
}

.goal-btns{display:flex;gap:var(--sp-4)}
.goal-btn{
  flex:1;
  padding:6px;
  background:transparent;
  border:0.5px solid var(--b1);
  border-radius:var(--r-sm);
  color:var(--t2);
  font-size:11px;
  cursor:pointer;
  font-family:inherit;
  font-weight:var(--fw-medium);
  transition:all var(--dur-fast) var(--ease-sharp),
             transform var(--dur-fast) var(--ease-spring);
}
.goal-btn:hover{background:var(--s3);color:var(--tc);border-color:var(--b2)}
.goal-btn:active{transform:scale(0.93)}

/* ============================================================
   § PROGRESS CARDS (generic)
   ============================================================ */
.prog-c{
  background:var(--s1);
  border:0.5px solid var(--b1);
  border-radius:var(--r-lg);
  padding:var(--sp-16);
  margin-bottom:var(--sp-8);
}
.prog-n{
  font-size:var(--fs-body);
  font-weight:var(--fw-medium);
  color:var(--tc);
  margin-bottom:2px;
}
.prog-sub{font-size:var(--fs-sub);color:var(--t2)}

/* ============================================================
   § EMPTY STATES
   ============================================================ */
.empty{
  text-align:center;
  color:var(--t2);
  font-size:var(--fs-sub);
  padding:var(--sp-48) var(--sp-16);
  line-height:2;
  letter-spacing:0.2px;
}
.empty strong{
  display:block;
  font-size:16px; /* ligeiramente maior que --fs-body para dar peso ao estado vazio */
  color:var(--tc);
  font-weight:var(--fw-medium);
  margin-bottom:var(--sp-4);
}

/* ============================================================
   § SEPARATORS
   ============================================================ */
.sep{height:0.5px;background:var(--t4);margin:var(--sp-16) 0}

/* ============================================================
   § MODALS — Bottom Sheet
   ============================================================ */
.modal-ov{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.75);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  z-index:100;
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  animation:fadeIn var(--dur-base) var(--ease-sharp);
}

.modal{
  background:var(--s1);
  border:0.5px solid var(--b2);
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  padding:var(--sp-24) var(--sp-16) max(var(--sp-32), env(safe-area-inset-bottom));
  width:100%;
  max-height:88%;
  overflow-y:auto;
  animation:modalIn var(--dur-slow) var(--ease-spring);
}

/* Modal drag handle */
.modal::before{
  content:'';
  display:block;
  width:36px;
  height:3px;
  border-radius:var(--r-pill);
  background:var(--s4);
  margin:0 auto var(--sp-24);
}

.modal h3{
  font-size:var(--fs-body);
  font-weight:var(--fw-medium);
  color:var(--tc);
  margin-bottom:var(--sp-16);
  letter-spacing:-0.1px;
}

.modal input,
.modal select,
.modal textarea{
  width:100%;
  background:var(--s2);
  border:0.5px solid var(--b1);
  border-radius:var(--r-md);
  padding:var(--sp-12);
  font-size:var(--fs-body);
  color:var(--tc);
  outline:none;
  margin-bottom:var(--sp-8);
  font-family:inherit;
  font-weight:var(--fw-normal);
  transition:border-color var(--dur-fast) var(--ease-sharp);
  -webkit-appearance:none;
}
.modal input:focus,
.modal select:focus,
.modal textarea:focus{border-color:var(--b2);background:var(--s3)}
.modal textarea{resize:none;min-height:72px;line-height:1.5}
.modal select option{background:var(--s1)}
.modal input::placeholder{color:var(--t3)}
.modal input::-webkit-input-placeholder{color:var(--t3)}

.m-btns{display:flex;gap:var(--sp-8);margin-top:var(--sp-8)}

.m-ok{
  flex:1;
  padding:12px;
  background:var(--ac);
  border:none;
  border-radius:var(--r-md);
  color:#000;
  cursor:pointer;
  font-family:inherit;
  font-size:var(--fs-sub);
  font-weight:var(--fw-medium);
  letter-spacing:0.5px;
  transition:opacity var(--dur-fast),transform var(--dur-fast) var(--ease-spring);
}
.m-ok:hover{opacity:0.88}
.m-ok:active{transform:scale(0.97)}

.m-cancel{
  flex:1;
  padding:12px;
  background:transparent;
  border:0.5px solid var(--b1);
  border-radius:var(--r-md);
  color:var(--t2);
  cursor:pointer;
  font-family:inherit;
  font-size:var(--fs-sub);
  font-weight:var(--fw-medium);
  transition:all var(--dur-fast) var(--ease-sharp);
}
.m-cancel:hover{border-color:var(--b2);color:var(--tc)}

/* ============================================================
   § BLOCK TYPE PICKER (modal)
   ============================================================ */
.blk-opt{
  display:flex;
  align-items:center;
  gap:var(--sp-12);
  padding:12px;
  border-radius:var(--r-md);
  cursor:pointer;
  transition:background var(--dur-fast) var(--ease-sharp);
}
.blk-opt:hover{background:var(--s3)}
.blk-opt:active{background:var(--s4)}

.blk-opt-icon{
  width:36px;
  height:36px;
  border-radius:var(--r-sm);
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--s3);
  border:0.5px solid var(--b1);
  flex-shrink:0;
  color:var(--t2);
}
.blk-opt-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

.blk-opt-name{font-size:var(--fs-body);font-weight:var(--fw-medium);color:var(--tc)}
.blk-opt-desc{font-size:var(--fs-sub);color:var(--t2);margin-top:2px}

/* ============================================================
   § BLOCK CUSTOMIZATION
   ============================================================ */
.blk-color-row{display:flex;gap:var(--sp-8);flex-wrap:wrap;margin-top:var(--sp-8)}
.blk-color-dot{
  width:22px;
  height:22px;
  border-radius:50%;
  cursor:pointer;
  border:2px solid transparent;
  transition:all var(--dur-base) var(--ease-spring);
}
.blk-color-dot:hover{transform:scale(1.2)}
.blk-color-dot.selected{border-color:var(--ac);transform:scale(1.15)}

.blk-icon-row{display:flex;gap:var(--sp-8);flex-wrap:wrap;margin-top:var(--sp-8)}
.blk-icon-opt{
  width:32px;
  height:32px;
  border-radius:var(--r-sm);
  background:var(--s3);
  border:0.5px solid var(--b1);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:all var(--dur-base) var(--ease-spring);
  color:var(--t2);
}
.blk-icon-opt svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.blk-icon-opt:hover{border-color:var(--b2);transform:scale(1.1);color:var(--tc)}
.blk-icon-opt.selected{border-color:var(--ac);background:var(--s4);color:var(--ac)}

/* ============================================================
   § CONFIG PANEL
   ============================================================ */
.cfg-tabs{
  display:flex;
  gap:var(--sp-4);
  margin-bottom:var(--sp-16);
  background:var(--s2);
  border-radius:var(--r-md);
  padding:3px;
  border:0.5px solid var(--b1);
}
.cfg-tab{
  flex:1;
  padding:8px 4px;
  background:transparent;
  border:none;
  border-radius:var(--r-sm);
  color:var(--t2);
  font-size:11px;
  letter-spacing:0.3px;
  cursor:pointer;
  font-family:inherit;
  font-weight:var(--fw-medium);
  transition:all var(--dur-base) var(--ease-sharp);
  text-align:center;
}
.cfg-tab.active{background:var(--s3);color:var(--tc);border:0.5px solid var(--b2)}

.cfg-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:0.5px solid var(--t4);
}
.cfg-row:last-child{border-bottom:none}
.cfg-row-label{font-size:var(--fs-body);color:var(--tc)}
.cfg-row-sub{font-size:var(--fs-micro);color:var(--t2);margin-top:2px}

.cfg-del{
  font-size:11px;
  color:var(--red);
  cursor:pointer;
  padding:5px 10px;
  border-radius:var(--r-sm);
  border:0.5px solid rgba(239,68,68,.2);
  background:rgba(239,68,68,.04);
  font-family:inherit;
  transition:all var(--dur-fast) var(--ease-sharp);
  font-weight:var(--fw-medium);
}
.cfg-del:hover{background:rgba(239,68,68,.10)}

/* Appearance settings */
.ap-section{margin-bottom:var(--sp-24)}
.ap-title{
  font-size:var(--fs-micro);
  font-weight:var(--fw-medium);
  color:var(--t3);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:var(--sp-12);
}
.ap-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:0.5px solid var(--t4);
}
.ap-row:last-child{border-bottom:none}
.ap-label{font-size:var(--fs-body);color:var(--tc)}
.ap-sub{font-size:var(--fs-micro);color:var(--t2);margin-top:2px}
.ap-control{display:flex;align-items:center;gap:var(--sp-8)}

.color-swatch-wrap{
  position:relative;
  width:28px;
  height:28px;
  border-radius:var(--r-sm);
  border:0.5px solid var(--b2);
  overflow:hidden;
  cursor:pointer;
}
.color-swatch-wrap input[type=color]{
  width:200%;height:200%;margin:-50%;
  border:none;cursor:pointer;background:none;opacity:0;position:absolute
}

.ap-select{
  background:var(--s3);
  border:0.5px solid var(--b1);
  border-radius:var(--r-sm);
  padding:5px 8px;
  font-size:11px;
  color:var(--tc);
  outline:none;
  font-family:inherit;
  cursor:pointer;
  -webkit-appearance:none;
}
.ap-select option{background:var(--s1)}
.ap-slider{width:90px;accent-color:var(--ac);cursor:pointer}

/* ── Theme swatches (substituem preset-btn) ── */
.theme-swatch-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:var(--sp-8);
  margin-bottom:var(--sp-8);
}
.preset-group-label{
  font-size:9px;
  font-weight:var(--fw-medium);
  color:var(--t2);
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin:var(--sp-12) 0 var(--sp-8);
}
.theme-swatch{
  border:none;
  padding:0;
  cursor:pointer;
  border-radius:var(--r-md);
  overflow:hidden;
  outline:2px solid transparent;
  outline-offset:2px;
  transition:outline-color var(--dur-fast) var(--ease-sharp),
             transform var(--dur-fast) var(--ease-spring);
  background:transparent;
  font-family:inherit;
}
.theme-swatch:active{transform:scale(0.94)}
.theme-swatch-active{outline-color:var(--ac)}
.sw-preview{
  position:relative;
  height:44px;
  overflow:hidden;
}
.sw-bg{
  width:100%;
  height:100%;
  position:relative;
  display:flex;
  align-items:flex-end;
  padding:5px 5px 0;
  gap:3px;
}
.sw-card{
  height:22px;
  flex:1;
  border-radius:3px;
  border:0.5px solid;
  opacity:0.9;
}
.sw-card2{flex:1.4}
.sw-dot{
  position:absolute;
  top:6px;
  right:6px;
  width:7px;
  height:7px;
  border-radius:50%;
}
.sw-name{
  font-size:10px;
  font-weight:500;
  padding:4px 6px;
  text-align:center;
  letter-spacing:0.2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
/* Legado — mantido para compatibilidade */
.preset-btn{
  padding:10px 6px;
  border-radius:var(--r-md);
  border:0.5px solid var(--b1);
  background:var(--s2);
  cursor:pointer;
  font-size:11px;
  color:var(--t2);
  font-family:inherit;
  text-align:center;
  transition:all var(--dur-fast) var(--ease-sharp);
  font-weight:var(--fw-medium);
  letter-spacing:0.3px;
}
.preset-btn:hover{border-color:var(--b2);color:var(--tc)}
.preset-btn.active-preset{border-color:var(--ac);color:var(--ac)}

/* ============================================================
   § TOGGLE SWITCH
   ============================================================ */
.toggle{position:relative;width:38px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{
  position:absolute;cursor:pointer;inset:0;
  background:var(--s3);border-radius:var(--r-pill);
  transition:background var(--dur-base) var(--ease-sharp);
  border:0.5px solid var(--b1);
}
.toggle-slider:before{
  position:absolute;content:"";
  height:16px;width:16px;left:2px;bottom:2px;
  background:var(--t2);border-radius:50%;
  transition:transform var(--dur-base) var(--ease-spring),background var(--dur-base);
}
.toggle input:checked+.toggle-slider{background:rgba(255,255,255,0.12);border-color:var(--b2)}
.toggle input:checked+.toggle-slider:before{transform:translateX(16px);background:var(--ac)}

/* ============================================================
   § DATA BUTTONS
   ============================================================ */
.data-btn{
  width:100%;
  padding:12px var(--sp-16);
  background:transparent;
  border:0.5px solid var(--b1);
  border-radius:var(--r-md);
  color:var(--tc);
  font-size:var(--fs-sub);
  cursor:pointer;
  font-family:inherit;
  font-weight:var(--fw-medium);
  letter-spacing:0.5px;
  margin-bottom:var(--sp-8);
  text-align:left;
  transition:all var(--dur-fast) var(--ease-sharp);
}
.data-btn:hover{background:var(--s3);border-color:var(--b2)}

/* ============================================================
   § DANGER ZONE
   ============================================================ */
.danger-confirm{
  background:rgba(239,68,68,.04);
  border:0.5px solid rgba(239,68,68,.18);
  border-radius:var(--r-md);
  padding:var(--sp-16);
  margin-top:var(--sp-8);
  animation:slideDown var(--dur-base) var(--ease-out);
}
.danger-confirm-title{
  font-size:var(--fs-sub);
  font-weight:var(--fw-medium);
  color:var(--red);
  margin-bottom:var(--sp-8);
}
.danger-confirm-msg{
  font-size:var(--fs-sub);
  color:var(--t2);
  margin-bottom:var(--sp-12);
  line-height:1.6;
}
.danger-confirm-input{
  width:100%;
  background:var(--s2);
  border:0.5px solid rgba(239,68,68,.2);
  border-radius:var(--r-sm);
  padding:10px var(--sp-12);
  font-size:var(--fs-body);
  color:var(--tc);
  outline:none;
  font-family:inherit;
  margin-bottom:var(--sp-12);
  letter-spacing:3px;
  text-align:center;
  font-weight:var(--fw-medium);
}
.danger-confirm-input:focus{border-color:rgba(239,68,68,.4)}
.danger-btns{display:flex;gap:var(--sp-8)}
.danger-cancel{
  flex:1;padding:10px;
  background:transparent;border:0.5px solid var(--b1);
  border-radius:var(--r-sm);color:var(--t2);
  cursor:pointer;font-family:inherit;font-size:var(--fs-sub);
  font-weight:var(--fw-medium);
  transition:all var(--dur-fast) var(--ease-sharp);
}
.danger-cancel:hover{border-color:var(--b2);color:var(--tc)}
.danger-ok{
  flex:1;padding:10px;
  background:rgba(239,68,68,.12);
  border:0.5px solid rgba(239,68,68,.25);
  border-radius:var(--r-sm);
  color:var(--red);cursor:pointer;
  font-family:inherit;font-size:var(--fs-sub);
  font-weight:var(--fw-medium);
  transition:all var(--dur-fast) var(--ease-sharp);
}
.danger-ok:hover{background:rgba(239,68,68,.22)}

/* ============================================================
   § MEDIA
   ============================================================ */
.ex-media{padding:var(--sp-12) var(--sp-16)}
.media-title{
  font-size:9px;color:var(--t3);
  letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:var(--sp-8);font-weight:var(--fw-medium);
}
.media-inp{display:flex;gap:var(--sp-8)}
.media-inp input{
  flex:1;background:var(--s3);border:0.5px solid var(--b1);
  border-radius:var(--r-sm);padding:7px var(--sp-12);
  font-size:11px;color:var(--t2);outline:none;font-family:inherit;
}
.media-inp input:focus{border-color:var(--b2);color:var(--tc)}
.media-inp input::placeholder{color:var(--t3)}
.media-add{
  background:var(--s3);border:0.5px solid var(--b1);
  border-radius:var(--r-sm);padding:7px var(--sp-12);
  font-size:11px;color:var(--t2);cursor:pointer;
  font-family:inherit;white-space:nowrap;
  transition:all var(--dur-fast);font-weight:var(--fw-medium);
}
.media-add:hover{border-color:var(--b2);color:var(--tc)}

.media-item{
  display:flex;align-items:center;gap:var(--sp-8);
  margin-top:var(--sp-8);background:var(--bg);
  border-radius:var(--r-sm);padding:6px var(--sp-12);
  border:0.5px solid var(--b1);
}
.media-type{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;width:28px;flex-shrink:0;font-weight:var(--fw-medium)}
.media-url{font-size:11px;color:var(--blue);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.media-del{font-size:10px;color:var(--t3);cursor:pointer;padding:2px var(--sp-4)}
.media-del:hover{color:var(--red)}
.media-yt{width:100%;border-radius:var(--r-md);margin-top:var(--sp-8);aspect-ratio:16/9;border:none;background:var(--bg)}

.media-img-wrap{position:relative;margin-top:var(--sp-8)}
.media-img{
  width:100%;border-radius:var(--r-md);
  max-height:160px;object-fit:cover;
  border:0.5px solid var(--b1);cursor:zoom-in;
  transition:opacity var(--dur-fast);display:block;
}
.media-img:hover{opacity:0.88}
.img-expand-btn{
  position:absolute;bottom:var(--sp-8);right:var(--sp-8);
  width:26px;height:26px;border-radius:var(--r-sm);
  background:rgba(0,0,0,.6);border:0.5px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:rgba(255,255,255,.8);font-size:10px;
  transition:all var(--dur-fast);
  backdrop-filter:blur(4px);
}
.img-expand-btn:hover{background:rgba(0,0,0,.82)}

.img-lightbox{
  position:fixed;inset:0;background:rgba(0,0,0,.9);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  padding:var(--sp-24);animation:fadeIn var(--dur-base) ease;cursor:zoom-out;
}
.img-lightbox img{
  max-width:100%;max-height:90vh;border-radius:var(--r-lg);
  animation:expandImg var(--dur-slow) var(--ease-spring);
}
.img-lightbox-close{
  position:absolute;top:var(--sp-16);right:var(--sp-16);
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.08);
  border:0.5px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:rgba(255,255,255,.8);font-size:14px;
  transition:all var(--dur-fast);
}
.img-lightbox-close:hover{background:rgba(255,255,255,.15)}

/* ============================================================
   § BADGE — semana "base" label
   ============================================================ */
.ex-base-badge{
  font-size:9px;color:var(--blue);
  background:rgba(96,165,250,.07);
  border:0.5px solid rgba(96,165,250,.18);
  padding:1px 6px;border-radius:var(--r-sm);
  margin-left:var(--sp-4);letter-spacing:0.2px;
  font-weight:var(--fw-medium);
}

/* ============================================================
   § TOAST
   ============================================================ */
.toast{
  position:absolute;
  bottom:86px;left:50%;
  transform:translateX(-50%);
  background:var(--s4); /* s3 → s4: toast deve flutuar acima do conteúdo */
  color:var(--tc);
  padding:8px var(--sp-16);
  border-radius:var(--r-pill);
  font-size:var(--fs-sub);
  z-index:200;
  opacity:0;
  pointer-events:none;
  white-space:nowrap;
  /* Sem borda: sombra é suficiente para separação visual (Phase 4) */
  letter-spacing:0.3px;
  font-weight:var(--fw-medium);
  transition:opacity var(--dur-base);
  box-shadow:0 4px 24px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.04) inset;
}
.toast.show{opacity:1;animation:toastIn var(--dur-base) var(--ease-spring)}

/* ============================================================
   § HISTORY MEDIA
   ============================================================ */
.hist-media-row{display:flex;gap:var(--sp-8);overflow-x:auto;padding:var(--sp-8) 0;scrollbar-width:none}
.hist-media-row::-webkit-scrollbar{display:none}
.hist-thumb{
  width:64px;height:64px;border-radius:var(--r-md);
  object-fit:cover;border:0.5px solid var(--b1);flex-shrink:0;
  cursor:zoom-in;transition:transform var(--dur-base) var(--ease-spring),opacity var(--dur-fast);
}
.hist-thumb:hover{transform:scale(1.05);opacity:0.9}

/* ============================================================
   § PAGE TRANSITION
   ============================================================ */
.page-anim{animation:pageIn var(--dur-base) var(--ease-out)}

/* ============================================================

   ============================================================ */
@keyframes slideDown{
  from{opacity:0;transform:translateY(-6px)}
  to{opacity:1;transform:translateY(0)}
}

  from{opacity:0}
  to{opacity:1}

}

function toast(m){

function ytId(url){const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);return m?m[1]:null}
function isImg(url){return/\.(jpg|jpeg|png|gif|webp|svg)(\?|$)/i.test(url)||url.startsWith('data:image')||/imgur\.com|i\.ibb\.co|imgbb\.com|postimg\.cc|pbs\.twimg\.com|media\.discordapp|cdn\.discordapp|gyazo\.com|prnt\.sc/.test(url)}
function openLink(u){window.open(u,'_blank')}
function looksLikeMedia(url){return isImg(url)||!!ytId(url)} /* compat alias */

function trend(curr,prev){
  if(prev===0||curr===0)return{cls:'eq',sym:'→',txt:'—'};
  const d=curr-prev,p=Math.round(Math.abs(d/prev)*100);
  if(d>0)return{cls:'up',sym:'↑',txt:'+'+p+'%'};
  if(d<0)return{cls:'dn',sym:'↓',txt:'-'+p+'%'};
  return{cls:'eq',sym:'→',txt:'='};
}

function getExHistory(exName){
  const vals=[];
  history.forEach(h=>{
    if(Array.isArray(h.exercises)){
      h.exercises.forEach(e=>{
        if(e.name===exName&&(e.weight>0||e.reps>0))
          vals.push({date:h.date,w:e.weight||0,r:e.reps||0,t:e.time||0});
      });
    } else if(Array.isArray(h.entries)){
      h.entries.forEach(b=>{
        (b.exercises||[]).forEach(e=>{
          if(e.name===exName&&(e.weight>0||e.reps>0))
            vals.push({date:h.date,w:e.weight||0,r:e.reps||0,t:e.time||0});
        });
      });
    }
  });
  return vals;
}

  const today=new Date().toLocaleDateString('pt-BR');
  const b=blocks[dk][bi];
  const exArr=b.exercises.map(e=>{
    const key=dk+String(bi)+e.name;
    const sEl=document.getElementById('s-'+key);
    const rEl=document.getElementById('r-'+key);
    const wEl=document.getElementById('w-'+key);
    const tEl=document.getElementById('t-'+key);
    return{name:e.name,sets:sEl?parseInt(sEl.value)||e.sets:e.sets,reps:rEl?parseInt(rEl.value)||0:e.reps||0,weight:wEl?parseFloat(wEl.value)||0:e.weight||0,time:tEl?parseInt(tEl.value)||0:e.time||0};
  });
  history.unshift({date:today,dayKey:dk,day:DAYFULL[DAYS.indexOf(dk)],blockLabel:b.label,blockType:b.type,exercises:exArr});
  if(history.length>180)history=history.slice(0,180);
  sv('bv2_history',history);sv('bv2_blocks',blocks);
  toast(b.label+' registrado');render();
}

function updEx(dk,bi,en,field,val){
  const ex=blocks[dk][bi].exercises.find(e=>e.name===en);
  if(ex){ex[field]=parseFloat(val)||0;sv('bv2_blocks',blocks);}
}
function updExBase(dk,bi,en,field,val){
  const ex=blocks[dk][bi].exercises.find(e=>e.name===en);
  if(ex){ex[field]=parseFloat(val)||0;sv('bv2_blocks',blocks);toast('Base atualizada');}
}

function addMedia(dk,bi,ei){
  const inp=document.getElementById('mi-'+dk+bi+ei);
  if(!inp)return;const url=inp.value.trim();if(!url)return;
  if(!blocks[dk][bi].exercises[ei].media)blocks[dk][bi].exercises[ei].media=[];
  blocks[dk][bi].exercises[ei].media.push(url);sv('bv2_blocks',blocks);inp.value='';render();
}
function delMedia(dk,bi,ei,mi){
  blocks[dk][bi].exercises[ei].media.splice(mi,1);sv('bv2_blocks',blocks);render();
}

function renderMediaSection(e,dk,bi,ei){
  const mid='mi-'+dk+bi+ei;
  let h=`<div class="ex-media"><div class="media-title">Mídia</div>`;
  (e.media||[]).forEach((url,mi)=>{
    const ytid=ytId(url);const imgLike=isImg(url);
    const typeLabel=ytid?'YT':imgLike?'IMG':'URL';
    h+=`<div class="media-item"><span class="media-type">${typeLabel}</span>`;
    h+=`<span class="media-url" onclick="openLink('${url}')">${url.length>40?url.slice(0,37)+'...':url}</span>`;
    h+=`<span class="media-del" onclick="delMedia('${dk}',${bi},${ei},${mi})">✕</span></div>`;
    if(ytid){
      h+=`<iframe class="media-yt" src="https://www.youtube.com/embed/${ytid}" allowfullscreen loading="lazy"></iframe>`;
    } else {
      h+=`<div class="media-img-wrap"><img class="media-img" src="${url}" onclick="openLightbox('${url}')" onerror="this.parentElement.style.display='none'" loading="lazy"><div class="img-expand-btn" onclick="openLightbox('${url}')">⤢</div></div>`;
    }
  });
  h+=`<div class="media-inp"><input type="text" id="${mid}" placeholder="URL imagem ou YouTube..."><button class="media-add" onclick="addMedia('${dk}',${bi},${ei})">+ Add</button></div></div>`;
  return h;
}

/* -------- ICON HELPER -------- */
function blockIcon(b){
  if(b.customIcon&&b.customIcon.length<=2)return`<span style="font-size:14px">${b.customIcon}</span>`;
  return BTYPE_ICONS[b.type]||BTYPE_ICONS.custom;
}

/* -------- RENDER EXERCISE ROW -------- */
function renderExRow(e,dk,bi,ei,fromSemana){
  const xkey=(fromSemana?'sem':'')+dk+bi+ei;
  const isOpen=openEx[xkey];
  const hasTime=e.time>0;
  const hist=getExHistory(e.name);
  let trndHtml='';
  if(hist.length>=2){
    const last=hist[0],prev=hist[1];
    const val={c:last.w||last.r||last.t,p:prev.w||prev.r||prev.t};
    const t=trend(val.c,val.p);
    trndHtml=`<span class="trnd ${t.cls}">${t.sym} ${t.txt}</span>`;
  }
  let exD='';
  if(isOpen){
    const updFn=fromSemana?'updExBase':'updEx';
    const pfx=fromSemana?'b':'';
    exD+=`<div class="ex-inputs-row">
      <div class="inp-g"><input id="s${pfx}-${dk+bi+e.name}" type="number" value="${e.sets}" min="1" onchange="${updFn}('${dk}',${bi},'${e.name}','sets',this.value)"><div class="inp-lbl">séries</div></div>
      ${hasTime
        ?`<div class="inp-g"><input id="t${pfx}-${dk+bi+e.name}" type="number" value="${e.time||0}" min="0" onchange="${updFn}('${dk}',${bi},'${e.name}','time',this.value)"><div class="inp-lbl">seg</div></div>`
        :`<div class="inp-g"><input id="r${pfx}-${dk+bi+e.name}" type="number" value="${e.reps||0}" min="0" onchange="${updFn}('${dk}',${bi},'${e.name}','reps',this.value)"><div class="inp-lbl">reps</div></div>`}
      <div class="inp-g"><input id="w${pfx}-${dk+bi+e.name}" type="number" value="${e.weight||0}" min="0" step="2.5" onchange="${updFn}('${dk}',${bi},'${e.name}','weight',this.value)"><div class="inp-lbl">kg</div></div>
    </div>`;
    if(fromSemana){
      exD+=`<div style="padding:8px 16px;font-size:10px;color:var(--t2);border-top:0.5px solid var(--t4);letter-spacing:0.3px">Alterações salvas como padrão</div>`;
    }
    exD+=renderMediaSection(e,dk,bi,ei);
  }
  const toggleFn=fromSemana?`toggleExSem('${xkey}','${dk}')`:`toggleEx('${xkey}')`;
  const chevSvg=`<svg viewBox="0 0 10 10"><path d="M2 3.5L5 6.5L8 3.5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  return`<div class="ex-row">
    <div class="ex-top" onclick="${toggleFn}">
      <div class="ex-name">${e.name}</div>
      <div class="ex-meta">
        ${trndHtml}
        <span class="ex-tag">${e.sets}×${hasTime?(e.time+'s'):(e.reps+' reps')}</span>
        ${e.weight?`<span class="ex-tag">${e.weight}kg</span>`:''}
        <div class="ex-expand-btn${isOpen?' open-btn':''}">${chevSvg}</div>
      </div>
    </div>
    ${isOpen?`<div class="ex-detail">${exD}</div>`:''}
  </div>`;
}

/* -------- RENDER BLOCK CARD -------- */
function renderBlockCard(b,dk,bi,prefix){
  const key=(prefix||dk)+bi;
  const isOpen=openBlk[key];
  const today=new Date().toLocaleDateString('pt-BR');
  const hasDone=history.some(h=>h.dayKey===dk&&h.date===today&&h.blockLabel===b.label);
  const colorAttr=b.accentColor?` data-color="${b.accentColor}"`:'';
  const addExFn=prefix
    ?`openModal({t:'addEx',dk:'${dk}',bi:${bi}});setTimeout(()=>reopenDay('${dk}'),10)`
    :`openModal({t:'addEx',dk:'${dk}',bi:${bi}})`;

  let body='';
  if(isOpen){
    b.exercises.forEach((e,ei)=>{body+=renderExRow(e,dk,bi,ei,prefix==='sem');});
    body+=`<button class="add-b" onclick="${addExFn}">
      <svg viewBox="0 0 12 12"><path d="M6 1v10M1 6h10" stroke-width="2" stroke-linecap="round"/></svg>
      exercício
    </button>`;
    body+=`<button class="sreg btn-ripple${hasDone?' done':''}" onclick="saveLog('${dk}',${bi})">
      ${hasDone?'✓ Registrado — atualizar':'Registrar bloco'}
    </button>`;
  }

  const chevSvg=`<svg viewBox="0 0 14 14"><path d="M3 5L7 9L11 5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  return`<div class="bc${isOpen?' open':''}${colorAttr}">
    <div class="bh" onclick="toggleBlk('${key}')">
      <div class="bl-icon">${blockIcon(b)}</div>
      <div class="bh-info">
        <div class="bn">${b.label}</div>
        <div class="bs">${b.exercises.length} exercício${b.exercises.length!==1?'s':''}</div>
      </div>
      <div class="bh-right">
        ${hasDone?'<div class="done-dot"></div>':''}
        <div class="bchev${isOpen?' o':''}">${chevSvg}</div>
      </div>
    </div>
    ${isOpen?`<div class="bbody">${body}</div>`:''}
  </div>`;
}

/* -------- TOGGLE HELPERS -------- */
function toggleEx(k){openEx[k]=!openEx[k];render()}
function toggleBlk(k){openBlk[k]=!openBlk[k];render()}
function toggleHist(k){openHist[k]=!openHist[k];render()}
function toggleExSem(k,dk){openEx[k]=!openEx[k];if(window._lastDayDetail)openDayDetail(window._lastDayDetail)}
function toggleBlkSem(k,dk){openBlk[k]=!openBlk[k];openDayDetail(dk)}

/* -------- MODAL -------- */
function openModal(m){modal=m;render()}
function closeModal(){modal=null;render()}

function renderModal(){
  if(!modal)return'';
  const m=modal;

  if(m.t==='addEx'){
    return`<div class="modal-ov" onclick="if(event.target===this)closeModal()"><div class="modal">
      <h3>Novo exercício</h3>
      <input type="text" id="m-en" placeholder="Nome do exercício" autocomplete="off">
      <select id="m-et"><option value="reps">Séries + Reps</option><option value="time">Séries + Tempo</option></select>
      <input type="number" id="m-es" placeholder="Séries" value="3" min="1">
      <input type="number" id="m-ev" placeholder="Reps / Segundos" value="10" min="1">
      <div class="m-btns"><button class="m-cancel" onclick="closeModal()">Cancelar</button><button class="m-ok btn-ripple" onclick="confAddEx()">Adicionar</button></div>
    </div></div>`;
  }

  if(m.t==='addBlock'){
    const opts=Object.entries(BTYPES).map(([k,v])=>`<div class="blk-opt" onclick="confAddBlock('${m.dk}','${k}')">
      <div class="blk-opt-icon">${BTYPE_ICONS[k]}</div>
      <div><div class="blk-opt-name">${v.l}</div><div class="blk-opt-desc">${v.d}</div></div>
    </div>`).join('');
    return`<div class="modal-ov" onclick="if(event.target===this)closeModal()"><div class="modal">
      <h3>Tipo de bloco</h3>${opts}
      <div class="m-btns" style="margin-top:8px"><button class="m-cancel" onclick="closeModal()">Cancelar</button></div>
    </div></div>`;
  }

  if(m.t==='editBlock'){
    const b=blocks[m.dk][m.bi];
    const BLOCK_COLORS=['','pink','blue','green','orange','purple','yellow','red','teal'];
    const COLOR_HEX={pink:'#f472b6',blue:'#60a5fa',green:'#4ade80',orange:'#fb923c',purple:'#a78bfa',yellow:'#fbbf24',red:'#f87171',teal:'#2dd4bf'};
    const colorBtns=BLOCK_COLORS.map(c=>
      `<div class="blk-color-dot${b.accentColor===c?' selected':''}" style="background:${c?COLOR_HEX[c]:'#2a2a2a'};${!c?'border:0.5px dashed #444':''}" onclick="setBlockColor('${m.dk}',${m.bi},'${c}')" title="${c||'padrão'}"></div>`
    ).join('');
    // SVG icons para seleção de bloco
    const iconBtns=Object.entries(BTYPE_ICONS).map(([k,svg])=>
      `<div class="blk-icon-opt${b.type===k?' selected':''}" onclick="setBlockType('${m.dk}',${m.bi},'${k}')" title="${BTYPES[k]?.l||k}">${svg}</div>`
    ).join('');
    return`<div class="modal-ov" onclick="if(event.target===this)closeModal()"><div class="modal">
      <h3>Editar bloco</h3>
      <input type="text" id="m-bl" value="${b.label}" placeholder="Nome do bloco">
      <textarea id="m-bn" placeholder="Notas (opcional)">${b.notes||''}</textarea>
      <div style="font-size:9px;color:var(--t2);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-weight:500">Cor</div>
      <div class="blk-color-row">${colorBtns}</div>
      <div style="font-size:9px;color:var(--t2);letter-spacing:2px;text-transform:uppercase;margin:16px 0 8px;font-weight:500">Ícone</div>
      <div class="blk-icon-row">${iconBtns}</div>
      <div class="sep"></div>
      <div style="font-size:9px;color:var(--t2);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-weight:500">Exercícios</div>
      ${b.exercises.map((e,ei)=>`<div class="cfg-row"><div><div class="cfg-row-label">${e.name}</div><div class="cfg-row-sub">${e.sets}× ${e.time>0&&e.reps===0?e.time+'s':e.reps+' reps'}${e.weight?' · '+e.weight+'kg':''}</div></div><button class="cfg-del" onclick="delEx('${m.dk}',${m.bi},${ei})">remover</button></div>`).join('')}
      <div class="sep"></div>
      <button class="cfg-del" style="width:100%;margin-bottom:12px;font-family:inherit;padding:10px;border-radius:var(--r-md);text-align:center" onclick="delBlock('${m.dk}',${m.bi})">Excluir bloco</button>
      <div class="m-btns"><button class="m-cancel" onclick="closeModal()">Fechar</button><button class="m-ok btn-ripple" onclick="confEditBlock()">Salvar</button></div>
    </div></div>`;
  }

  if(m.t==='addGoal'){
    return`<div class="modal-ov" onclick="if(event.target===this)closeModal()"><div class="modal">
      <h3>Nova meta</h3>
      <input type="text" id="m-gn" placeholder="Nome da meta" autocomplete="off">
      <input type="text" id="m-gs" placeholder="Descrição (opcional)">
      <div class="m-btns"><button class="m-cancel" onclick="closeModal()">Cancelar</button><button class="m-ok btn-ripple" onclick="confAddGoal()">Criar</button></div>
    </div></div>`;
  }
  return'';
}

/* -------- MODAL ACTIONS -------- */
function confAddEx(){
  const n=document.getElementById('m-en').value.trim();if(!n)return;
  const tp=document.getElementById('m-et').value;
  const s=parseInt(document.getElementById('m-es').value)||3;
  const v=parseInt(document.getElementById('m-ev').value)||10;
  const ex={name:n,sets:s,reps:tp==='reps'?v:0,weight:0,media:[]};
  if(tp==='time')ex.time=v;
  blocks[modal.dk][modal.bi].exercises.push(ex);
  sv('bv2_blocks',blocks);closeModal();
}
function confAddBlock(dk,type){
  const bt=BTYPES[type];
  if(!blocks[dk])blocks[dk]=[];
  blocks[dk].push({type,label:bt.l,notes:'',exercises:[]});
  sv('bv2_blocks',blocks);closeModal();toast('Bloco criado');
}
function confEditBlock(){
  const b=blocks[modal.dk][modal.bi];
  b.label=document.getElementById('m-bl').value.trim()||b.label;
  b.notes=document.getElementById('m-bn').value.trim();
  sv('bv2_blocks',blocks);closeModal();toast('Bloco atualizado');
}
function setBlockColor(dk,bi,color){
  blocks[dk][bi].accentColor=color;sv('bv2_blocks',blocks);
  modal={t:'editBlock',dk,bi};render();
}
function setBlockType(dk,bi,type){
  blocks[dk][bi].type=type;sv('bv2_blocks',blocks);
  modal={t:'editBlock',dk,bi};render();
}
function setBlockIcon(dk,bi,icon){
  blocks[dk][bi].customIcon=icon;sv('bv2_blocks',blocks);
  modal={t:'editBlock',dk,bi};render();
}

/* -------- LIGHTBOX -------- */
function openLightbox(url){
  const lb=document.createElement('div');lb.className='img-lightbox';
  lb.innerHTML=`<img src="${url}" alt=""><div class="img-lightbox-close" onclick="this.parentElement.remove()">✕</div>`;
  lb.onclick=function(e){if(e.target===lb)lb.remove();};
  document.getElementById('app').appendChild(lb);
}

/* -------- CRUD -------- */
function delEx(dk,bi,ei){blocks[dk][bi].exercises.splice(ei,1);sv('bv2_blocks',blocks);render()}
function delBlock(dk,bi){blocks[dk].splice(bi,1);sv('bv2_blocks',blocks);closeModal();toast('Bloco removido')}
function confAddGoal(){
  const n=document.getElementById('m-gn').value.trim();if(!n)return;
  const s=document.getElementById('m-gs').value.trim();
  goals.push({name:n,progress:0,note:s});sv('bv2_goals',goals);closeModal();
}
function updGoal(i,d){goals[i].progress=Math.max(0,Math.min(100,goals[i].progress+d));sv('bv2_goals',goals);render()}
function delGoal(i){goals.splice(i,1);sv('bv2_goals',goals);render()}

/* -------- NAVIGATION -------- */
function nav(p){
  page=p;configOpen=false;
  document.getElementById('gear-btn').classList.remove('active');
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('nb-'+p).classList.add('active');
  render();
}
function toggleConfig(){
  configOpen=!configOpen;
  document.getElementById('gear-btn').classList.toggle('active',configOpen);
  render();
}

/* -------- PAGE RENDERS -------- */
function renderHoje(){
  const db=blocks[todayKey]||[];
  let h=`<div class="sec">${DAYFULL[todayI]}</div>`;
  if(!db.length)h+=`<div class="empty"><strong>Sem blocos hoje</strong>Vá em Semana para montar o dia.</div>`;
  db.forEach((b,i)=>h+=renderBlockCard(b,todayKey,i,'hoje'));
  h+=`<button class="add-b" onclick="openModal({t:'addBlock',dk:'${todayKey}'})">
    <svg viewBox="0 0 12 12"><path d="M6 1v10M1 6h10" stroke-width="2" stroke-linecap="round"/></svg>
    Novo bloco
  </button>`;
  return h;
}

function renderSemana(){
  let h=`<div class="sec">Semana</div><div class="wk-grid">`;
  DAYS.forEach((d,i)=>{
    const db=blocks[d]||[];const isT=i===todayI;
    const blist=db.length?db.map(b=>`<span class="dc-dot"></span>${b.label}`).join('<br>'):`<span style="color:var(--t3)">—</span>`;
    h+=`<div class="dc${isT?' today':''}" onclick="openDayDetail('${d}')">
      <div class="dc-day">${d}${isT?` <span style="width:4px;height:4px;border-radius:50%;background:var(--ac);display:inline-block;margin-left:2px"></span>`:''}</div>
      <div class="dc-blocks">${blist}</div>
    </div>`;
  });
  h+=`</div><div id="dd"></div>`;
  return h;
}

function openDayDetail(dk){
  const db=blocks[dk]||[];const i=DAYS.indexOf(dk);
  let h=`<div class="sep"></div><div class="sec">${DAYFULL[i]}</div>`;
  db.forEach((b,bi)=>{
    const key='sem'+dk+bi;
    const isOpen=openBlk[key];
    let body='';
    if(isOpen){
      b.exercises.forEach((e,ei)=>{body+=renderExRow(e,dk,bi,ei,true);});
      body+=`<button class="add-b" onclick="openModal({t:'addEx',dk:'${dk}',bi:${bi}});setTimeout(()=>reopenDay('${dk}'),10)">
        <svg viewBox="0 0 12 12"><path d="M6 1v10M1 6h10" stroke-width="2" stroke-linecap="round"/></svg>
        exercício
      </button>`;
      body+=`<button class="sreg" onclick="openModal({t:'editBlock',dk:'${dk}',bi:${bi}})">Editar bloco</button>`;
    }
    const chevSvg=`<svg viewBox="0 0 14 14"><path d="M3 5L7 9L11 5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    h+=`<div class="bc">
      <div class="bh" onclick="toggleBlkSem('${key}','${dk}')">
        <div class="bl-icon">${blockIcon(b)}</div>
        <div class="bh-info"><div class="bn">${b.label}</div><div class="bs">${b.exercises.length} exercício${b.exercises.length!==1?'s':''}</div></div>
        <div class="bchev${isOpen?' o':''}">${chevSvg}</div>
      </div>
      ${isOpen?`<div class="bbody">${body}</div>`:''}
    </div>`;
  });
  h+=`<button class="add-b" onclick="openModal({t:'addBlock',dk:'${dk}'})">
    <svg viewBox="0 0 12 12"><path d="M6 1v10M1 6h10" stroke-width="2" stroke-linecap="round"/></svg>
    Novo bloco em ${dk}
  </button>`;
  const dd=document.getElementById('dd');
  if(dd){
    dd.innerHTML=h;
    setTimeout(()=>{
      const ct=document.getElementById('content');
      if(ct&&dd)ct.scrollTop=dd.offsetTop-16;
    },80);
  }
  window._lastDayDetail=dk;
}

function reopenDay(dk){if(window._lastDayDetail)openDayDetail(window._lastDayDetail)}

function renderHistorico(){
  let h=`<div class="sec">Histórico</div>`;
  if(!history.length)h+=`<div class="empty"><strong>Nenhum treino registrado</strong>Abra um bloco em Hoje e registre.</div>`;
  const byDate={};
  history.forEach((entry,hi)=>{
    if(!byDate[entry.date])byDate[entry.date]={date:entry.date,day:entry.day,entries:[],indices:[]};
    byDate[entry.date].entries.push(entry);byDate[entry.date].indices.push(hi);
  });
  Object.values(byDate).slice(0,20).forEach(group=>{
    const groupKey='g'+group.date.replace(/\//g,'');const isOpen=openHist[groupKey];
    let body='';
    if(isOpen){
      group.entries.forEach(entry=>{
        const blocks_to_render=Array.isArray(entry.exercises)
          ?[{label:entry.blockLabel,type:entry.blockType,exercises:entry.exercises}]
          :(entry.entries||[]);
        blocks_to_render.forEach(blk=>{
          body+=`<div style="margin-top:12px;padding-top:12px;border-top:0.5px solid var(--t4)">
            <div style="font-size:10px;font-weight:500;color:var(--t2);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase">${blk.label||entry.blockLabel||''}</div>`;
          (blk.exercises||[]).forEach(e=>{
            let val;
            if(e.time&&e.time>0&&(!e.reps||e.reps===0)){val=`${e.sets}×${e.time}s`;}
            else if(e.weight&&e.weight>0){val=`${e.sets}×${e.reps} · ${e.weight}kg`;}
            else{val=`${e.sets}×${e.reps}`;}
            body+=`<div class="h-ex-row"><span class="h-ex-name">${e.name}</span><span class="h-ex-val">${val}</span></div>`;
          });
          body+=`</div>`;
        });
      });
    }
    const chevSvg=`<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5L7 9L11 5"/></svg>`;
    h+=`<div class="hist-c">
      <div class="hist-h" onclick="openHist['${groupKey}']=!openHist['${groupKey}'];render()">
        <div>
          <div class="hist-day">${group.day}</div>
          <div class="hist-date">${group.date} · ${group.entries.length} bloco${group.entries.length!==1?'s':''}</div>
        </div>
        <div class="bchev${isOpen?' o':''}">${chevSvg}</div>
      </div>
      ${isOpen?`<div class="hist-body">${body}</div>`:''}
    </div>`;
  });

  h+=`<div class="sec" style="margin-top:24px">Evolução</div>`;
  const exMap={};
  history.forEach(en=>{
    const exList=Array.isArray(en.exercises)?en.exercises:(en.entries||[]).flatMap(b=>b.exercises||[]);
    exList.forEach(e=>{
      if(!exMap[e.name])exMap[e.name]=[];
      exMap[e.name].push({w:e.weight||0,r:e.reps||0,t:e.time||0,d:en.date});
    });
  });
  const tracked=Object.entries(exMap).filter(([,v])=>v.length>=2);
  if(!tracked.length){
    h+=`<div class="empty"><strong>Sem dados de evolução</strong>Registre ao menos 2 blocos para ver progresso.</div>`;
  } else {
    tracked.forEach(([name,vals])=>{
      const curr=vals[0];const prev=vals[vals.length>4?vals.length-4:vals.length-1];
      const useW=curr.w>0;
      const cv=useW?curr.w:(curr.r||curr.t);
      const pv=useW?prev.w:(prev.r||prev.t);
      if(!cv&&!pv)return;
      const t=trend(cv,pv);
      h+=`<div class="ind-card">
        <div class="ind-ex">${name}</div>
        <div class="ind-cmp">
          <div class="ind-val"><div class="ind-num" style="color:var(--t2)">${pv}${useW?'kg':curr.t?'s':'rep'}</div><div class="ind-lbl">anterior</div></div>
          <div class="ind-arr ${t.cls}">${t.sym}</div>
          <div class="ind-val"><div class="ind-num">${cv}${useW?'kg':curr.t?'s':'rep'}</div><div class="ind-lbl">recente</div></div>
          <div style="flex:1;text-align:right"><span class="trnd ${t.cls}">${t.txt}</span></div>
        </div>
      </div>`;
    });
  }
  return h;
}

function renderMetas(){
  let h=`<div class="sec">Metas</div>`;
  goals.forEach((g,i)=>{
    h+=`<div class="goal-c">
      <div class="goal-h">
        <div>
          <div class="goal-n">${g.name}</div>
          ${g.note?`<div style="font-size:var(--fs-sub);color:var(--t2);margin-top:3px">${g.note}</div>`:''}
        </div>
        <div class="goal-pct">${g.progress}%</div>
      </div>
      <div class="goal-bar-bg"><div class="goal-bar-f" style="width:${g.progress}%"></div></div>
      <div class="goal-btns">
        <button class="goal-btn" onclick="updGoal(${i},-10)">−10</button>
        <button class="goal-btn" onclick="updGoal(${i},-5)">−5</button>
        <button class="goal-btn" onclick="updGoal(${i},5)">+5</button>
        <button class="goal-btn" onclick="updGoal(${i},10)">+10</button>
        <button class="goal-btn" style="color:var(--red);border-color:rgba(239,68,68,.15)" onclick="delGoal(${i})">×</button>
      </div>
    </div>`;
  });
  h+=`<button class="add-b" onclick="openModal({t:'addGoal'})">
    <svg viewBox="0 0 12 12"><path d="M6 1v10M1 6h10" stroke-width="2" stroke-linecap="round"/></svg>
    Nova meta
  </button>`;
  return h;
}

/* -------- CONFIG -------- */
function renderConfig(){
  let h=`<div class="sec">Configurações</div>`;
  h+=`<div class="cfg-tabs">`;
  [{id:'blocos',label:'Blocos'},{id:'aparencia',label:'Aparência'},{id:'dados',label:'Dados'}].forEach(tab=>{
    h+=`<button class="cfg-tab${configTab===tab.id?' active':''}" onclick="setConfigTab('${tab.id}')">${tab.label}</button>`;
  });
  h+=`</div>`;
  if(configTab==='blocos')h+=renderConfigBlocos();
  else if(configTab==='aparencia')h+=renderConfigAparencia();
  else h+=renderConfigDados();
  return h;
}

function setConfigTab(t){configTab=t;render()}

function renderConfigBlocos(){
  let h='';
  DAYS.forEach(dk=>{
    const db=blocks[dk]||[];
    h+=`<div class="prog-c">
      <div class="prog-n">${dk}</div>
      <div class="prog-sub">${db.length?db.map(b=>b.label).join(' · '):'Sem blocos'}</div>
      <div style="margin-top:8px">
        ${db.map((b,bi)=>`<div class="cfg-row">
          <div><div class="cfg-row-label">${b.label}</div><div class="cfg-row-sub">${BTYPES[b.type]?.l||'Custom'} · ${b.exercises.length} ex.</div></div>
          <button class="cfg-del" onclick="openModal({t:'editBlock',dk:'${dk}',bi:${bi}})">editar</button>
        </div>`).join('')}
        <button class="add-b" style="margin-top:8px" onclick="openModal({t:'addBlock',dk:'${dk}'})">
          <svg viewBox="0 0 12 12"><path d="M6 1v10M1 6h10" stroke-width="2" stroke-linecap="round"/></svg>
          + bloco em ${dk}
        </button>
      </div>
    </div>`;
  });
  return h;
}

function renderConfigAparencia(){
  const a=appearance;
  let h=`<div class="ap-section">`;
  h+=`<div class="ap-title">Tema</div>`;
  const darkThemes=['dark','obsidian','forest','ember','steel','midnight','carbon'];
  const lightThemes=['leninha','paper','frost','sage'];
  const renderGroup=(ids)=>{
    let g='<div class="theme-swatch-grid">';
    ids.forEach(id=>{
      const t=THEMES[id]; if(!t)return;
      const active=a.theme===id;
      const label=id.charAt(0).toUpperCase()+id.slice(1);
      /* Swatch: quadrado com gradiente bg→s2 + dot de acento no canto */
      g+=`<button class="theme-swatch${active?' theme-swatch-active':''}" onclick="setTheme('${id}')" title="${label}" style="--sw-bg:${t.bg};--sw-s1:${t.s1};--sw-s2:${t.s2};--sw-ac:${t.ac};--sw-tc:${t.tc};--sw-t2:${t.t2}">
        <div class="sw-preview">
          <div class="sw-bg" style="background:${t.bg}">
            <div class="sw-card" style="background:${t.s1};border-color:${t.t3}"></div>
            <div class="sw-card sw-card2" style="background:${t.s2};border-color:${t.t3}"></div>
          </div>
          <div class="sw-dot" style="background:${t.ac}"></div>
        </div>
        <div class="sw-name" style="color:${t.tc};background:${t.s1}">${active?'✓ ':''} ${label}</div>
      </button>`;
    });
    return g+'</div>';
  };
  h+=`<div class="preset-group-label">Escuros</div>`;
  h+=renderGroup(darkThemes);
  h+=`<div class="preset-group-label">Claros</div>`;
  h+=renderGroup(lightThemes);
  h+=`<div class="ap-row">
    <div><div class="ap-label">Cor de destaque</div><div class="ap-sub">Barras, botão principal</div></div>
    <div class="ap-control"><div class="color-swatch-wrap" style="background:${a.accentColor}"><input type="color" value="${a.accentColor}" oninput="setAccentColor(this.value)" onchange="setAccentColor(this.value)"></div></div>
  </div>`;
  h+=`<div class="ap-row">
    <div><div class="ap-label">Fonte</div></div>
    <div class="ap-control"><select class="ap-select" onchange="setFont(this.value)">${FONT_OPTIONS.map(f=>`<option value="${f.id}"${a.font===f.id?' selected':''}>${f.name}</option>`).join('')}</select></div>
  </div>`;
  h+=`<div class="ap-row">
    <div><div class="ap-label">Bordas arredondadas</div><div class="ap-sub">${a.borderRadius}px</div></div>
    <div class="ap-control"><input type="range" class="ap-slider" min="0" max="20" value="${a.borderRadius}" oninput="setBorderRadius(this.value)"></div>
  </div>`;
  h+=`<div class="ap-row">
    <div><div class="ap-label">Velocidade das animações</div><div class="ap-sub">${a.animSpeed||'normal'}</div></div>
    <div class="ap-control"><select class="ap-select" onchange="setAnimSpeed(this.value)">
      <option value="fast"${(a.animSpeed||'normal')==='fast'?' selected':''}>Rápida</option>
      <option value="normal"${(a.animSpeed||'normal')==='normal'?' selected':''}>Normal</option>
      <option value="slow"${(a.animSpeed||'normal')==='slow'?' selected':''}>Suave</option>
    </select></div>
  </div>`;
  h+=`<div class="ap-row">
    <div><div class="ap-label">Modo compacto</div><div class="ap-sub">Menos espaçamento</div></div>
    <div class="ap-control"><label class="toggle"><input type="checkbox"${a.compactMode?' checked':''} onchange="setCompact(this.checked)"><span class="toggle-slider"></span></label></div>
  </div>`;
  h+=`</div>`;
  h+=`<button class="data-btn" onclick="resetAppearance()" style="color:var(--red);border-color:rgba(239,68,68,.15)">↺ Resetar aparência</button>`;
  return h;
}

function renderConfigDados(){
  let h='';
  h+=`<div class="prog-c">
    <div class="prog-n">Exportar dados</div>
    <div class="prog-sub">${history.length} treinos · ${Object.values(blocks).flat().length} blocos · ${goals.length} metas</div>
    <button class="data-btn" style="margin-top:12px" onclick="exportData()">↓ Baixar JSON</button>
  </div>`;
  h+=`<div class="prog-c">
    <div class="prog-n">Importar dados</div>
    <div class="prog-sub">Carregue um arquivo JSON exportado</div>
    <div style="margin-top:12px">
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
      <button class="data-btn" onclick="document.getElementById('import-file').click()">↑ Carregar JSON</button>
    </div>
  </div>`;
  h+=`<div class="prog-c" style="border-color:rgba(239,68,68,.12)">
    <div class="prog-n" style="color:var(--red)">Zona de perigo</div>
    <div class="prog-sub">Ações irreversíveis</div>
    <button class="data-btn" style="margin-top:12px;color:var(--red);border-color:rgba(239,68,68,.15)" onclick="initDangerAction('history')">Limpar histórico</button>
    ${dangerConfirmStep['history']?`<div class="danger-confirm" id="danger-confirm-history">
      <div class="danger-confirm-title">Confirmação necessária</div>
      <div class="danger-confirm-msg">Apaga todos os ${history.length} treinos registrados. Irreversível.<br><br>Digite <strong>APAGAR</strong> para confirmar:</div>
      <input class="danger-confirm-input" id="danger-input-history" placeholder="APAGAR" maxlength="6" autocomplete="off">
      <div class="danger-btns"><button class="danger-cancel" onclick="cancelDanger('history')">Cancelar</button><button class="danger-ok" onclick="confirmDanger('history')">Confirmar</button></div>
    </div>`:''}
    <button class="data-btn" style="color:var(--red);border-color:rgba(239,68,68,.15)" onclick="initDangerAction('reset')">Resetar tudo</button>
    ${dangerConfirmStep['reset']?`<div class="danger-confirm" id="danger-confirm-reset">
      <div class="danger-confirm-title">Atenção máxima</div>
      <div class="danger-confirm-msg">Apaga TODOS os dados. Impossível desfazer.<br><br>Digite <strong>RESETAR</strong> para confirmar:</div>
      <input class="danger-confirm-input" id="danger-input-reset" placeholder="RESETAR" maxlength="7" autocomplete="off">
      <div class="danger-btns"><button class="danger-cancel" onclick="cancelDanger('reset')">Cancelar</button><button class="danger-ok" onclick="confirmDanger('reset')">Confirmar</button></div>
    </div>`:''}
  </div>`;
  return h;
}

/* -------- APPEARANCE SETTERS -------- */
function setTheme(id){appearance.theme=id;sv('bv2_appearance',appearance);applyAppearance();render()}
function setAccentColor(v){appearance.accentColor=v;sv('bv2_appearance',appearance);applyAppearance()}
function setFont(id){appearance.font=id;sv('bv2_appearance',appearance);applyAppearance();render()}
function setBorderRadius(v){appearance.borderRadius=parseInt(v);sv('bv2_appearance',appearance);applyAppearance();render()}
function setCompact(v){appearance.compactMode=v;sv('bv2_appearance',appearance);applyAppearance()}
function setAnimSpeed(v){
  appearance.animSpeed=v;sv('bv2_appearance',appearance);
  const speeds={fast:'0.15s',normal:'0.22s',slow:'0.38s'};
  document.documentElement.style.setProperty('--dur-base',speeds[v]||'0.22s');
  render();
}
function resetAppearance(){
  appearance={theme:'dark',accentColor:'#ffffff',font:'helvetica',borderRadius:14,compactMode:false,animSpeed:'normal'};
  sv('bv2_appearance',appearance);applyAppearance();render();toast('Aparência resetada');
}

/* -------- DATA -------- */
function exportData(){
  const d=JSON.stringify({blocks,history,goals},null,2);
  const b=new Blob([d],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='bloc-data.json';a.click();
  toast('Exportado');
}
function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.blocks)blocks=data.blocks;
      if(data.history)history=data.history;
      if(data.goals)goals=data.goals;
      sv('bv2_blocks',blocks);sv('bv2_history',history);sv('bv2_goals',goals);
      toast('Dados importados');render();
    }catch(err){toast('Erro ao importar');}
  };
  reader.readAsText(file);input.value='';
}

/* -------- DANGER ZONE -------- */
function initDangerAction(action){dangerConfirmStep[action]=true;render();setTimeout(()=>{const el=document.getElementById('danger-confirm-'+action);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},100)}
function cancelDanger(action){delete dangerConfirmStep[action];render()}
function confirmDanger(action){
  const inp=document.getElementById('danger-input-'+action);if(!inp)return;
  const val=inp.value.trim().toUpperCase();
  if(action==='history'&&val!=='APAGAR'){toast('Digite APAGAR para confirmar');return;}
  if(action==='reset'&&val!=='RESETAR'){toast('Digite RESETAR para confirmar');return;}
  delete dangerConfirmStep[action];
  if(action==='history'){history=[];sv('bv2_history',history);toast('Histórico apagado');render();}
  if(action==='reset'){localStorage.clear();location.reload();}
}

/* -------- MAIN RENDER -------- */
function render(){
  let h='';
  if(configOpen)h=renderConfig();
  else if(page==='hoje')h=renderHoje();
  else if(page==='semana')h=renderSemana();
  else if(page==='historico')h=renderHistorico();
  else if(page==='metas')h=renderMetas();
  const content=document.getElementById('content');
  content.innerHTML=`<div class="page-anim">${h}</div>`+renderModal();
}

applyAppearance();
render();
</script>
</body>
